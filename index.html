<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusCuba Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="messenger">
        <div class="sidebar">
            <div class="header">
                <div class="user-profile">
                    <img id="current-avatar" src="" alt="Аватар" class="avatar">
                    <div>
                        <h1 id="current-name">FusCuba</h1>
                        <small id="current-email"></small>
                    </div>
                </div>
                <button class="btn-new" onclick="newChat()">+</button>
            </div>
            <div class="contacts" id="contacts-list">
                <!-- Контакты заполняются из localStorage -->
            </div>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">Выход</button>
            </div>
        </div>

        <div class="chat">
            <div class="chat-header">
                <div class="chat-header-content">
                    <img id="contact-avatar" src="" alt="Аватар" class="avatar-small">
                    <div>
                        <h2 id="contact-name">Контакт 1</h2>
                        <small id="contact-status">В сети</small>
                    </div>
                </div>
                <button class="btn-options">⋮</button>
            </div>
            <div class="messages" id="messages-list">
                <!-- Сообщения заполняются динамически -->
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Напишите сообщение...">
                <button class="btn-send" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script src="messenger.js"></script>
</body>
</html>
