<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusCuba Messenger - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <h1>FusCuba</h1>
                <p>Мессенджер нового поколения</p>
            </div>

            <!-- Форма входа -->
            <div id="login-form" class="auth-form active">
                <h2>Вход в аккаунт</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" placeholder="Минимум 6 символов" required>
                    </div>
                    <button type="submit" class="btn-auth">Войти</button>
                </form>
                <p class="auth-switch">
                    Нет аккаунта? <a href="#" onclick="switchForm(event)">Зарегистрироваться</a>
                </p>
            </div>

            <!-- Форма регистрации -->
            <div id="register-form" class="auth-form">
                <h2>Создать аккаунт</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-name">Имя</label>
                        <input type="text" id="register-name" placeholder="Ваше имя" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Пароль</label>
                        <input type="password" id="register-password" placeholder="Минимум 6 символов" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Подтвердить пароль</label>
                        <input type="password" id="register-confirm" placeholder="Повторите пароль" required>
                    </div>
                    <button type="submit" class="btn-auth">Зарегистрироваться</button>
                </form>
                <p class="auth-switch">
                    Уже есть аккаунт? <a href="#" onclick="switchForm(event)">Войти</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
